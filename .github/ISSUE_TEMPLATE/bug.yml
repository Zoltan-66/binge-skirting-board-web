name: Bug report
description: Report reproducible incorrect behaviour.
title: "[Bug]: "
labels: ["type: bug", "status: triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Preview URL, browser, device, viewport
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, recordings, logs, or affected product URLs.
