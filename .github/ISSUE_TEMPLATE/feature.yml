name: Feature
description: Plan a user-facing capability or product experience.
title: "[Feature]: "
labels: ["type: feature", "status: triage"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should be true for the user or business when this is complete?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link relevant product records, design frames, research, or dependencies.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Foundation
        - Design system
        - Product discovery
        - Product detail
        - Content
        - RFQ and conversion
        - SEO
        - Accessibility
        - Infrastructure
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Tests, screenshots, content review, responsive states, or analytics events.
